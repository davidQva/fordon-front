<style>
  :root {
    --ink: #1b1b1b;
    --ink-soft: #4a4a4a;
    --ink-mute: #8a8a8a;
    --paper: #fbfaf5;
    --paper-2: #f3f1e7;
    --line: #1b1b1b;
    --accent: #218E33;        /* only used sparingly */
    --danger: #c1292e;
    --warn:   #d59b1f;
    --ok:     #3b9d48;
  }
  html, body { background: var(--paper); color: var(--ink); font-family: "Kalam", "Patrick Hand", cursive; }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; font-weight: 500; }
  .hand { font-family: "Kalam", cursive; }
  .script { font-family: "Caveat", cursive; }

  /* --- Sketchy paper background with faint ruled lines --- */
  .paper {
    background-color: var(--paper);
    background-image:
      linear-gradient(rgba(0,0,0,0.035) 1px, transparent 1px);
    background-size: 100% 28px;
  }
  .paper-plain { background: var(--paper); }

  /* --- Wobbly hand-drawn stroke via multiple box-shadows & subtle skew --- */
  .ink-box {
    border: 1.5px solid var(--ink);
    border-radius: 6px;
    box-shadow: 2px 2px 0 0 var(--ink);
    background: #ffffff;
  }
  .ink-box-soft {
    border: 1.25px solid var(--ink);
    border-radius: 6px;
    background: #ffffff;
  }
  .ink-dash {
    border: 1.5px dashed var(--ink);
    border-radius: 8px;
    background: rgba(255,255,255,0.6);
  }
  .ink-pill {
    border: 1.25px solid var(--ink);
    border-radius: 999px;
    background: #ffffff;
    padding: 2px 10px;
    font-family: "Kalam", cursive;
    font-weight: 700;
    font-size: 13px;
    line-height: 1.3;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
  }
  .ink-pill.filled { background: var(--ink); color: var(--paper); }
  .ink-btn {
    border: 1.5px solid var(--ink);
    border-radius: 6px;
    box-shadow: 2px 2px 0 0 var(--ink);
    background: #fff;
    padding: 6px 14px;
    font-family: "Kalam", cursive;
    font-weight: 700;
    transition: transform 80ms ease, box-shadow 80ms ease;
    cursor: pointer;
    white-space: nowrap;
  }
  .ink-btn:hover { transform: translate(1px,1px); box-shadow: 1px 1px 0 0 var(--ink); }
  .ink-btn:active { transform: translate(2px,2px); box-shadow: 0 0 0 0 var(--ink); }
  .ink-btn.primary { background: var(--ink); color: var(--paper); }
  .ink-btn.accent  { background: var(--accent); color: #fff; border-color: #0e5f21; box-shadow: 2px 2px 0 0 #0e5f21; }

  /* Dot status */
  .dot { width: 10px; height: 10px; border-radius: 999px; border: 1.25px solid var(--ink); display:inline-block; }
  .dot.ok   { background: var(--ok); }
  .dot.warn { background: var(--warn); }
  .dot.bad  { background: var(--danger); }
  .dot.off  { background: #d9d9d9; }

  /* Underline scribble */
  .scribble { position: relative; }
  .scribble::after{
    content:""; position:absolute; left:-2px; right:-2px; bottom:-6px; height:8px;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 8' preserveAspectRatio='none'><path d='M0 5 C 15 1, 30 8, 45 4 S 75 7, 90 3 S 115 6, 120 4' stroke='%231b1b1b' stroke-width='1.8' fill='none' stroke-linecap='round'/></svg>") center/100% 100% no-repeat;
  }

  /* Hand-crossed checkbox */
  .check { width:16px; height:16px; border:1.5px solid var(--ink); border-radius:3px; display:inline-block; position:relative; background:#fff; }
  .check.on::after {
    content:""; position:absolute; inset:1px;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path d='M1 6 L5 10 L11 1' stroke='%231b1b1b' stroke-width='2' fill='none' stroke-linecap='round'/></svg>") center/contain no-repeat;
  }

  /* Small img wash for placeholder silhouettes */
  .silhouette {
    filter: grayscale(1) contrast(1.2) brightness(0.65);
    mix-blend-mode: multiply;
    opacity: 0.9;
  }
  .silhouette-big { filter: grayscale(1) contrast(1.3) brightness(0.55); opacity: 0.92; mix-blend-mode: multiply; }

  /* Tiny wiggle on hover for cards */
  .wobble:hover { transform: rotate(-0.3deg) translate(-1px,-1px); }
  .wobble { transition: transform 120ms ease; }

  /* Tab bar */
  .tab {
    font-family: "Kalam", cursive; font-weight: 700; font-size: 16px;
    padding: 8px 16px; border: 1.5px solid var(--ink);
    border-bottom: none; border-radius: 10px 10px 0 0;
    background: #fff; color: var(--ink-soft);
    margin-right: 4px; cursor: pointer; position: relative; top: 1px;
    white-space: nowrap;
  }
  .tab.active { background: var(--ink); color: var(--paper); box-shadow: 2px -2px 0 0 var(--ink); }

  /* Torn-edge strip */
  .tape {
    position: absolute; width: 70px; height: 18px;
    background: rgba(234,196,56,0.45); border: 1px dashed rgba(0,0,0,0.3);
    transform: rotate(-4deg);
  }

  /* Legend callout arrow */
  .arrow { stroke: var(--ink); fill: none; stroke-width: 1.5; stroke-linecap: round; }

  /* function tile */
  .fn-tile {
    border: 1.5px solid var(--ink);
    background: #fff;
    border-radius: 8px;
    padding: 12px;
    display: flex; flex-direction: column; gap: 6px;
    min-height: 90px;
    box-shadow: 2px 2px 0 0 var(--ink);
    cursor: pointer;
    transition: transform 80ms ease, box-shadow 80ms ease;
  }
  .fn-tile:hover { transform: translate(1px,1px); box-shadow: 1px 1px 0 0 var(--ink); }
  .fn-tile .ic {
    width: 28px; height: 28px; border: 1.5px solid var(--ink); border-radius: 6px;
    display:flex; align-items:center; justify-content:center; background: var(--paper-2); font-size: 14px;
  }

  /* Tweaks floating panel */
  .tweaks {
    position: fixed; right: 18px; bottom: 18px; z-index: 60;
    background: #fff; border: 1.5px solid var(--ink); border-radius: 10px;
    box-shadow: 3px 3px 0 0 var(--ink);
    padding: 14px; min-width: 240px; font-family: "Kalam", cursive;
  }
  .tweaks h4 { font-weight: 700; font-size: 14px; margin-bottom: 8px; }
  .tweak-row { display:flex; justify-content:space-between; align-items:center; gap:10px; padding: 4px 0; font-size: 14px; }
  .tweaks select, .tweaks input { border: 1.25px solid var(--ink); border-radius: 4px; padding: 2px 6px; font-family: inherit; font-size: 13px; background: #fff; }

  /* SVG wobble border to apply as background */
  .wobble-border {
    border: none !important;
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' preserveAspectRatio='none'><rect x='1' y='1' width='98' height='98' rx='4' stroke='%231b1b1b' stroke-width='1.6' fill='none' stroke-dasharray='0' stroke-linejoin='round'/></svg>");
    background-size: 100% 100%;
    background-repeat: no-repeat;
    background-color: #fff;
    border-radius: 6px;
  }

  /* Note sticky */
  .sticky-note {
    background: #fff6b3; border: 1px solid #d2c67a; padding: 8px 10px;
    font-family: "Caveat", cursive; font-size: 17px; line-height: 1.2;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.15);
    transform: rotate(-1.2deg);
  }

};

          <div className="flex items-center gap-3 hand text-[12px] text-[var(--ink-mute)]">

          ))}
          {/* Sketch road network */}
          <path d="M 180 90 C 240 150, 270 210, 295 285 S 315 385, 355 445" stroke="rgba(0,0,0,0.13)" strokeWidth="2.2" fill="none" strokeLinecap="round"/>
          <path d="M 295 285 C 355 262, 408 248, 455 238 S 558 218, 610 198" stroke="rgba(0,0,0,0.13)" strokeWidth="2.2" fill="none" strokeLinecap="round"/>
          <path d="M 355 305 C 405 322, 465 338, 525 348" stroke="rgba(0,0,0,0.10)" strokeWidth="1.5" fill="none" strokeLinecap="round"/>
          <path d="M 455 238 C 462 292, 472 342, 482 402" stroke="rgba(0,0,0,0.10)" strokeWidth="1.5" fill="none" strokeLinecap="round"/>
          <path d="M 180 90 C 210 95, 270 88, 350 80 S 460 75, 530 95" stroke="rgba(0,0,0,0.08)" strokeWidth="1.2" fill="none" strokeLinecap="round"/>

            const pinFill   = v.status==='ok' ? '#3b9d48' : v.status==='warn' ? '#d59b1f' : '#c1292e';
            const ringColor = hasRed ? '#c1292e' : hasOrange ? '#d59b1f' : null;

        <div className="absolute bottom-4 left-4">
          {allClear ? (
            <div className="flex items-center gap-2 px-3 py-2 rounded-lg hand text-sm"
              style={{background:'rgba(59,157,72,0.12)', border:'1px solid rgba(59,157,72,0.5)'}}>

              <span style={{color:'var(--danger)', fontWeight:700}}>{redAlerts.length} akuta larm — klicka fordon på kartan</span>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* DriverCell — default card state only; expansion is handled by the parent grid.
   onExpand is only passed when history exists. */
function DriverCell({ driver, driverSince, driverHistory = [], onExpand }) {
  const hasHistory = driverHistory.length > 0;
  const noDriver   = driver === '—';
  return (
    <div className="ink-box-soft p-3">
      <div className="mono text-[10px] text-[var(--ink-mute)] uppercase tracking-wider">Förare</div>
      <div className="hand font-bold text-[17px] mt-1">{noDriver ? '—' : driver}</div>
      {!noDriver && driverSince
        ? <div className="hand text-[12px] text-[var(--ink-mute)]">sedan {driverSince}</div>
        : !noDriver && <div className="hand text-[12px] text-[var(--ink-mute)]">tilldelad</div>
      }
      {noDriver && <div className="hand text-[12px] text-[var(--ink-mute)]">ingen tilldelad</div>}
      {hasHistory && (
        <button onClick={onExpand}
          className="hand text-[12px] mt-2 flex items-center gap-1 hover:opacity-70"
          style={{color:'var(--ink-mute)'}}>
          <span style={{fontSize:9}}>▸</span>
          {driverHistory.length} tidigare {driverHistory.length === 1 ? 'förare' : 'förare'}
        </button>
      )}
    </div>
  );
}

/* DriverExpanded — full-width history panel shown when the driver card is expanded.
   Two-column layout: current driver left, history right. Groups periods under each name. */
function DriverExpanded({ driver, driverSince, driverHistory = [] }) {
  const noDriver = driver === '—';
  return (
    <div className="flex gap-8">
      {/* Left: current driver */}
      <div className="shrink-0" style={{minWidth:180}}>
        <div className="mono text-[10px] text-[var(--ink-mute)] uppercase tracking-wider mb-1">Nuvarande förare</div>
        <div className="hand font-bold text-[20px] leading-tight">{noDriver ? '—' : driver}</div>
        {!noDriver && driverSince && (
          <div className="hand text-[13px] text-[var(--ink-mute)] mt-0.5">sedan {driverSince}</div>
        )}
        {noDriver && <div className="hand text-[13px] text-[var(--ink-mute)]">ingen tilldelad</div>}
      </div>

      {/* Divider */}
      {driverHistory.length > 0 && <div className="w-px bg-black/15 self-stretch"/>}

      {/* Right: history grouped by person */}
      {driverHistory.length > 0 && (
        <div className="flex-1 min-w-0">
          <div className="mono text-[10px] text-[var(--ink-mute)] uppercase tracking-wider mb-3">Tidigare förare</div>
          <div className="flex flex-wrap gap-x-8 gap-y-3">
            {driverHistory.map((d, i) => (
              <div key={i} className="min-w-[180px]">
                <div className="hand font-bold text-[14px] leading-tight">{d.name}</div>
                <div className="mt-1 space-y-0.5">
                  {d.periods.map((p, j) => (
                    <div key={j} className="flex items-center gap-2">
                      <span className="mono text-[11px] text-[var(--ink-mute)]">{p}</span>
                      {d.periods.length > 1 && j > 0 && (
                        <span className="hand text-[10px] italic" style={{color:'var(--warn)'}}>återkom</span>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

              <div className="flex flex-wrap items-center gap-2 pb-3 mb-4 border-b border-dashed border-black/25">
                {staticCards.filter(c => c.id !== expandedCard).map(c => (
                  <button key={c.id} onClick={() => setExpanded(c.id)}
                    className="ink-box-soft px-2.5 py-1.5 flex items-center gap-1.5 hover:bg-[var(--paper-2)] text-left">
                    <span className="mono text-[9px] text-[var(--ink-mute)] uppercase tracking-wider whitespace-nowrap">{c.label}</span>
                    <span className="hand font-bold text-[13px] whitespace-nowrap">{c.value}</span>
                  </button>
                ))}
                {expandedCard !== 'driver' && (
                  <button onClick={() => setExpanded('driver')}
                    className="ink-box-soft px-2.5 py-1.5 flex items-center gap-1.5 hover:bg-[var(--paper-2)]">
                    <span className="mono text-[9px] text-[var(--ink-mute)] uppercase tracking-wider">Förare</span>
                    <span className="hand font-bold text-[13px]">{v.driver}</span>
                  </button>
                )}
                <button onClick={() => setExpanded(null)}
                  className="ml-auto ink-btn" style={{fontSize:12, padding:'4px 10px'}}>
                  ← standardvy
                </button>
              </div>

              {/* Full-width expanded content */}
              {expandedCard === 'driver' && (
                <DriverExpanded driver={v.driver} driverSince={v.driverSince} driverHistory={v.driverHistory||[]}/>
              )}
              {expandedCard !== 'driver' && (() => {
                const c = staticCards.find(x => x.id === expandedCard);
                return c ? (
                  <div>
                    <div className="mono text-[10px] text-[var(--ink-mute)] uppercase tracking-wider">{c.label}</div>
                    <div className="hand font-bold text-3xl mt-1">{c.value}</div>
                    <div className="hand text-[13px] text-[var(--ink-mute)] mt-0.5">{c.sub}</div>
                  </div>
                ) : null;
              })()}
            </div>
          )}

          {tab !== 'översikt' && (
            <div className="min-h-[280px] flex items-center justify-center">
              <div className="text-center">
                <div className="hand text-xl font-bold">[ {tab} ]</div>
                <div className="hand text-[var(--ink-mute)] mt-1">fliken "{tab}" för {v.reg}</div>
                <div className="mt-3 mono text-[11px] text-[var(--ink-mute)]">wireframe · full vy utvecklas separat</div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

      return v.reg.toLowerCase().includes(q) || v.model.toLowerCase().includes(q) || v.driver.toLowerCase().includes(q);

    <div className="paper" style={{minHeight:'100vh'}}>

        <div className="max-w-[1180px] mx-auto px-6 py-3 flex items-center gap-0">

            </div>

          <div className="w-px h-9 bg-black/15 mr-6"/>

              <div className="mono text-[10px] text-[var(--ink-mute)] uppercase tracking-wider leading-none mb-0.5">Larm</div>
              <div className="flex items-center gap-2 leading-tight">
                {redAlerts.length > 0 && (
                  <span className="hand font-bold text-xl" style={{color:'var(--danger)'}}>{redAlerts.length} akut</span>
                )}
                {orangeAlerts.length > 0 && (
                  <span className="hand font-bold text-xl" style={{color:'var(--warn)'}}>
                    {redAlerts.length > 0 && <span className="opacity-40 mr-1">·</span>}{orangeAlerts.length} planerat

                )}
                {redAlerts.length===0 && orangeAlerts.length===0 && (
                  <span className="hand font-bold text-xl" style={{color:'var(--ok)'}}>Allt klart ✓</span>
                )}
                <span className="mono text-[10px] text-[var(--ink-mute)]">{alertPaneOpen ? '▴' : '▾'}</span>
              </div>
            </div>
          </button>
          <div className="w-px h-9 bg-black/15 mr-6"/>

          {/* KPI 3 — Fuel cost */}
          <div className="flex items-center gap-2.5 pr-6">
            <div>
              <div className="mono text-[10px] text-[var(--ink-mute)] uppercase tracking-wider leading-none mb-0.5">Bränsle apr</div>
              <div className="hand font-bold text-xl leading-tight">12 840 kr</div>
            </div>
          </div>
          <div className="w-px h-9 bg-black/15 mr-6"/>

          {/* KPI 4 — Next maintenance */}
          <div className="flex items-center gap-2.5">
            <div>
              <div className="mono text-[10px] text-[var(--ink-mute)] uppercase tracking-wider leading-none mb-0.5">Nästa service</div>
              <div className="flex items-center gap-1.5 leading-tight">
                <span className="hand font-bold text-xl" style={{color:urgentColor}}>{daysToNext} dagar</span>
                <span className="mono text-[11px] text-[var(--ink-mute)]">· {nextMaint?.reg}</span>
              </div>
            </div>
          </div>

          <div className="ml-auto mono text-[11px] text-[var(--ink-mute)]">uppdaterad 07:42</div>
        </div>
      </div>

      {/* ─────────── ALERT PANE (drops under top bar on demand) ─────────── */}
      {alertPaneOpen && (
        <div className="border-b-2 border-black bg-white">
          <div className="max-w-[1180px] mx-auto px-6 py-4">
            <div className="flex items-center justify-between mb-3">
              <div className="hand font-bold text-lg">Aktiva larm</div>
              <button onClick={()=>setAlertPaneOpen(false)} className="hand text-[var(--ink-mute)] text-sm hover:text-[var(--ink)]">stäng ✕</button>
            </div>

            {redAlerts.length > 0 && (
              <div className="mb-4">
                <div className="mono text-[10px] uppercase tracking-wider mb-2" style={{color:'var(--danger)'}}>Akuta larm — åtgärd krävs nu</div>
                <div className="space-y-2">
                  {redAlerts.map(a => (
                    <div key={a.reg+a.label} className="ink-box p-3 flex items-center justify-between"
                      style={{borderColor:'var(--danger)', boxShadow:'2px 2px 0 0 var(--danger)', background:'#fff8f8'}}>
                      <div className="flex items-center gap-2">
                        <span className="dot bad"/>
                        <div>
                          <div className="flex items-center gap-2">
                            <span className="hand font-bold">{a.label}</span>
                            <span className="mono text-[12px] text-[var(--ink-mute)]">· {a.reg}</span>
                          </div>
                          <div className="hand text-[12px] text-[var(--ink-mute)]">{a.detail}</div>
                        </div>
                      </div>
                      <button onClick={()=>handleAlertClick(a)} className="ink-btn" style={{fontSize:13, borderColor:'var(--danger)', boxShadow:'2px 2px 0 0 var(--danger)'}}>{a.actionLabel}</button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {orangeAlerts.length > 0 && (
              <div>
                <div className="mono text-[10px] uppercase tracking-wider mb-2" style={{color:'var(--warn)'}}>Planerade åtgärder — inom 30 dagar</div>
                <div className="space-y-2">
                  {orangeAlerts.map(a => (
                    <div key={a.reg+a.label} className="ink-box-soft p-3 flex items-center justify-between"
                      style={{borderColor:'var(--warn)', background:'#fffbee'}}>
                      <div className="flex items-center gap-2">
                        <span className="dot warn"/>
                        <div>
                          <div className="flex items-center gap-2">
                            <span className="hand font-bold">{a.label}</span>
                            <span className="mono text-[12px] text-[var(--ink-mute)]">· {a.reg}</span>
                          </div>
                          <div className="hand text-[12px] text-[var(--ink-mute)]">{a.detail}</div>
                        </div>
                      </div>
                      <button onClick={()=>handleAlertClick(a)} className="ink-btn" style={{fontSize:13}}>{a.actionLabel}</button>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ─────────── MAIN LAYOUT: sidebar + content ─────────── */}
      <div className="max-w-[1180px] mx-auto px-6 py-4 flex gap-5" style={{minHeight:'calc(100vh - 160px)'}}>

              style={{fontFamily:'Kalam, cursive', color:'var(--ink)'}}

          {/* Status filter */}
          <div className="flex gap-1 flex-wrap">
            {[['all','Alla'],['ok','Aktiva'],['warn','Varning'],['off','Avställda']].map(([k,l])=>(
              <button key={k} onClick={()=>setSidebarFilter(k)}
                className={`ink-pill ${sidebarFilter===k?'filled':''}`} style={{fontSize:11}}>{l}</button>

          <div className="flex-1 space-y-1.5 overflow-y-auto pr-0.5" style={{maxHeight:'calc(100vh - 330px)'}}>
            {filteredVehicles.map(v => {
              const active     = v.reg === selectedReg;
              const hasRed     = redAlerts.some(a => a.reg === v.reg);
              const hasOrange  = orangeAlerts.some(a => a.reg === v.reg);
              const borderColor = !active && hasRed ? 'var(--danger)' : !active && hasOrange ? 'var(--warn)' : 'var(--ink)';
              return (
                <button key={v.reg}
                  onClick={()=>setSelectedReg(active ? null : v.reg)}
                  className="w-full text-left p-2.5 border-[1.5px] rounded-md flex items-center gap-3 wobble"
                  style={{
                    borderColor,
                    background: active ? 'var(--ink)' : '#fff',
                    color: active ? 'var(--paper)' : 'var(--ink)',
                    boxShadow: active ? '2px 2px 0 0 #555' : `2px 2px 0 0 ${borderColor}`,
                  }}>
                  <VehicleThumb v={v} size={26}/>
                  <div className="flex-1 min-w-0">
                    <div className="mono text-[13px] font-bold tracking-wider">{v.reg}</div>
                    <div className="hand text-[11.5px] truncate" style={{opacity:active?0.8:0.65}}>{v.model}</div>
                  </div>
                  <div className="flex flex-col items-end gap-1">
                    <StatusDot s={v.status}/>
                    {!active && (hasRed||hasOrange) && (
                      <span style={{width:5,height:5,borderRadius:'50%',display:'inline-block',
                        background: hasRed ? 'var(--danger)' : 'var(--warn)'}}/>

                  </div>
                </button>
              );
            })}
          </div>

          {/* Add vehicle */}
          <button className="ink-dash flex items-center justify-center gap-2 py-2.5 wobble">
            <span className="hand text-sm">＋ Lägg till fordon</span>
          </button>
        </div>

        {/* ── Main area: map (default) or vehicle detail ── */}
        <div className="flex-1 min-w-0">
          {!picked
            ? <MapView
                vehicles={VEHICLES}
                colorful={colorful}
                redAlerts={redAlerts}
                orangeAlerts={orangeAlerts}
                onSelectVehicle={setSelectedReg}
              />
            : <VehicleDetail
                v={picked}
                colorful={colorful}
                redAlerts={redAlerts.filter(a => a.reg===picked.reg)}
                orangeAlerts={orangeAlerts.filter(a => a.reg===picked.reg)}
                onBack={()=>setSelectedReg(null)}
              />
          }
        </div>
      </div>
    </div>
  );
}

  const urgent = days !== null && days < 14;
  const soon   = days !== null && days < 30;
  return (
    <div className="space-y-4">
      <div className="grid grid-cols-3 gap-3">
        <div className="ink-box p-4"
          style={urgent ? {borderColor:'var(--danger)', boxShadow:'2px 2px 0 0 var(--danger)', background:'#fff8f8'} : soon ? {borderColor:'var(--warn)', background:'#fffbee'} : {}}>
          <div className="mono text-[10px] uppercase tracking-wider text-[var(--ink-mute)]">Nästa besiktning</div>
          <div className="hand font-bold text-[22px] mt-1 mono" style={{color: urgent ? 'var(--danger)' : soon ? 'var(--warn)' : 'var(--ink)'}}>
            {v.besiktning === '—' ? 'Avställd' : v.besiktning}
          </div>
          {days !== null && <div className="hand text-[13px]" style={{color: urgent ? 'var(--danger)' : 'var(--ink-mute)'}}>
            {days < 0 ? `Förfallen ${Math.abs(days)} dagar sedan` : `om ${days} dagar`}
          </div>}
        </div>
        <div className="ink-box-soft p-4">
          <div className="mono text-[10px] uppercase tracking-wider text-[var(--ink-mute)]">Senaste besiktning</div>
          <div className="hand font-bold text-[18px] mt-1">2024-09-12</div>
          <div className="hand text-[12px] text-[var(--ink-mute)]">Godkänd — inga anmärkningar</div>
        </div>
        <div className="ink-box-soft p-4">
          <div className="mono text-[10px] uppercase tracking-wider text-[var(--ink-mute)]">Besiktningsorgan</div>
          <div className="hand font-bold text-[18px] mt-1">Opus Bilprovning</div>
          <div className="hand text-[12px] text-[var(--ink-mute)]">Halmstad, Industrigatan 28</div>
        </div>
      </div>
      {(urgent || soon) && (
        <div className="flex items-center gap-3 p-3 rounded-md"
          style={{background: urgent ? '#fff8f8' : '#fffbee', border:`1px solid ${urgent ? 'var(--danger)' : 'var(--warn)'}`}}>
          <span className={`dot ${urgent ? 'bad' : 'warn'}`}/>
          <div className="hand text-[14px]">{urgent ? 'Besiktning förfaller snart — boka omedelbart' : 'Besiktning inom 30 dagar — boka nu'}</div>

        </div>

/* ============================================================
   OPTION E — Full Architecture Dashboard
   B structure + all 6 modules + complete .md coverage
   ============================================================ */
function OptionE({ colorful }) {
  const [selectedReg, setSelectedReg]     = useState(null);
  const [sidebarFilter, setSidebarFilter] = useState('all');
  const [sidebarSearch, setSidebarSearch] = useState('');
  const [alertPaneOpen, setAlertPaneOpen] = useState(false);

  const redAlerts = [

    { reg:'GHI 789', label:'Avställd utan tillåtelse',detail:'Fordon kördes avställt 2026-04-18',               action:'korjournal', actionLabel:'Visa körjournal →' },
    { reg:'STU 901', label:'DTC-fel: P0420 + P0171',  detail:'Katalysator + syresensor — verkstad krävs',      action:'telematik',  actionLabel:'Öppna telematik →' },

    { reg:'PQR 678', label:'Besiktning om 27 dagar',  detail:'Nästa besiktning: 22 maj 2026',                  action:'besiktning', actionLabel:'Boka besiktning →' },

  const onRouteVehicles = VEHICLES.filter(v => ECU_DATA[v.reg]?.ignition);
  const activeCount     = VEHICLES.filter(v => v.status==='ok').length;

  const sortOrder = { warn:0, ok:1, off:2 };

    .filter(v => sidebarFilter==='all' || v.status===sidebarFilter)
    .filter(v => {

      const q = sidebarSearch.toLowerCase();
      return v.reg.toLowerCase().includes(q) || v.model.toLowerCase().includes(q) || v.driver.toLowerCase().includes(q);

    .sort((a,b) => sortOrder[a.status] - sortOrder[b.status]);

  function handleAlertClick(alert) { setSelectedReg(alert.reg); setAlertPaneOpen(false); }

    <div className="paper" style={{minHeight:'100vh'}}>
      <SketchHeader onHome={()=>{ setSelectedReg(null); setAlertPaneOpen(false); }}/>

      {/* ─── TOP BAR: 4 KPIs per ARCHITECTURE.md TB1–TB4 ─── */}
      <div className="border-b-[1.5px] border-dashed border-black/40 bg-white">
        <div className="max-w-[1180px] mx-auto px-6 py-3 flex items-center gap-0">
          <div className="flex items-center gap-2.5 pr-6">
            <span className="dot ok"/>
            <div>
              <div className="mono text-[10px] text-[var(--ink-mute)] uppercase tracking-wider leading-none mb-0.5">Aktiva fordon</div>
              <div className="hand font-bold text-xl leading-tight">{activeCount}/{VEHICLES.length}</div>
            </div>
          </div>
          <div className="w-px h-9 bg-black/15 mr-6"/>

          <button onClick={()=>setAlertPaneOpen(o=>!o)} className="flex items-center gap-2.5 pr-6 hover:opacity-75 transition-opacity">
            <div>
              <div className="mono text-[10px] text-[var(--ink-mute)] uppercase tracking-wider leading-none mb-0.5">Larm</div>
              <div className="flex items-center gap-2 leading-tight">
                {redAlerts.length > 0 && <span className="hand font-bold text-xl" style={{color:'var(--danger)'}}>{redAlerts.length} akut</span>}
                {orangeAlerts.length > 0 && <span className="hand font-bold text-xl" style={{color:'var(--warn)'}}>
                  {redAlerts.length > 0 && <span className="opacity-40 mr-1">·</span>}{orangeAlerts.length} planerat
                </span>}
                {redAlerts.length===0 && orangeAlerts.length===0 && <span className="hand font-bold text-xl" style={{color:'var(--ok)'}}>Allt klart ✓</span>}
                <span className="mono text-[10px] text-[var(--ink-mute)]">{alertPaneOpen?'▴':'▾'}</span>

          </button>
          <div className="w-px h-9 bg-black/15 mr-6"/>

          <div className="flex items-center gap-2.5 pr-6">
            <div>
              <div className="mono text-[10px] text-[var(--ink-mute)] uppercase tracking-wider leading-none mb-0.5">Bränsle apr</div>
              <div className="hand font-bold text-xl leading-tight">12 840 kr</div>
            </div>
          </div>
          <div className="w-px h-9 bg-black/15 mr-6"/>

          <div className="flex items-center gap-2.5">
            <div>
              <div className="mono text-[10px] text-[var(--ink-mute)] uppercase tracking-wider leading-none mb-0.5">På väg nu</div>
              <div className="flex items-center gap-1.5 leading-tight">
                <span className="hand font-bold text-xl" style={{color: onRouteVehicles.length>0 ? 'var(--ok)' : 'var(--ink-mute)'}}>
                  {onRouteVehicles.length}
                </span>
                <span className="mono text-[11px] text-[var(--ink-mute)]">· {onRouteVehicles.map(v=>v.reg).join(', ')}</span>
              </div>
            </div>
          </div>

          <div className="ml-auto mono text-[11px] text-[var(--ink-mute)]">uppdaterad 07:42</div>
        </div>
      </div>

      {/* ─── ALERT PANE: 3 columns — kritiskt / snart / info ─── */}
      {alertPaneOpen && (
        <div className="border-b-2 border-black bg-white">
          <div className="max-w-[1180px] mx-auto px-6 py-4">
            <div className="flex items-center justify-between mb-3">
              <div className="hand font-bold text-lg">Aktiva larm & händelser</div>
              <button onClick={()=>setAlertPaneOpen(false)} className="hand text-[var(--ink-mute)] text-sm hover:text-[var(--ink)]">stäng ✕</button>
            </div>
            <div className="grid grid-cols-3 gap-5">
              <div>
                <div className="mono text-[10px] uppercase tracking-wider mb-2" style={{color:'var(--danger)'}}>🔴 Kritiskt nu — åtgärd omedelbart</div>
                <div className="space-y-2">
                  {redAlerts.map(a => (
                    <div key={a.reg+a.label} className="ink-box p-2.5 flex items-start gap-2"
                      style={{borderColor:'var(--danger)', boxShadow:'2px 2px 0 0 var(--danger)', background:'#fff8f8'}}>

                        <div className="hand font-bold text-[13px]">{a.label}</div>
                        <div className="mono text-[10px] text-[var(--ink-mute)]">{a.reg}</div>
                        <div className="hand text-[11px] text-[var(--ink-mute)]">{a.detail}</div>

                    </div>
                  ))}
                </div>
              </div>
              <div>
                <div className="mono text-[10px] uppercase tracking-wider mb-2" style={{color:'var(--warn)'}}>🟠 Snart förfaller — inom 30 dagar</div>
                <div className="space-y-2">
                  {orangeAlerts.map(a => (
                    <div key={a.reg+a.label} className="ink-box-soft p-2.5 flex items-start gap-2"
                      style={{borderColor:'var(--warn)', background:'#fffbee'}}>
                      <span className="dot warn mt-0.5 shrink-0"/>
                      <div className="flex-1 min-w-0">
                        <div className="hand font-bold text-[13px]">{a.label}</div>
                        <div className="mono text-[10px] text-[var(--ink-mute)]">{a.reg}</div>
                        <div className="hand text-[11px] text-[var(--ink-mute)]">{a.detail}</div>
                      </div>
                      <button onClick={()=>handleAlertClick(a)} className="ink-btn shrink-0" style={{fontSize:11, padding:'3px 8px'}}>→</button>
                    </div>
                  ))}
                </div>
              </div>
              <div>
                <div className="mono text-[10px] uppercase tracking-wider mb-2 text-[var(--ink-mute)]">⚪ Info — senaste händelser</div>
                <div className="space-y-2">
                  {infoAlerts.map((a,i) => (
                    <div key={i} className="ink-box-soft p-2.5 flex items-start gap-2 bg-[var(--paper-2)]"
                      style={{cursor:'pointer'}} onClick={()=>handleAlertClick(a)}>
                      <span className="dot off mt-0.5 shrink-0"/>
                      <div className="flex-1 min-w-0">
                        <div className="hand font-bold text-[13px]">{a.label}</div>
                        <div className="hand text-[11px] text-[var(--ink-mute)]">{a.detail}</div>
                      </div>
                    </div>

            </div>

      {/* ─── MAIN LAYOUT ─── */}
      <div className="max-w-[1180px] mx-auto px-6 py-4 flex gap-5" style={{minHeight:'calc(100vh - 180px)'}}>
        {/* Sidebar */}
        <div className="w-[252px] shrink-0 flex flex-col gap-3">
          <div className="ink-box-soft px-3 py-2 flex items-center gap-2">
            <span className="mono text-xs opacity-60">🔎︎</span>
            <input value={sidebarSearch} onChange={e=>setSidebarSearch(e.target.value)}
              placeholder="sök regnr / förare…"
              className="flex-1 bg-transparent hand text-sm outline-none"
              style={{fontFamily:'Kalam, cursive', color:'var(--ink)'}}/>
          </div>
          <div className="flex gap-1 flex-wrap">
            {[['all','Alla'],['ok','Aktiva'],['warn','Varning'],['off','Avställda']].map(([k,l])=>(
              <button key={k} onClick={()=>setSidebarFilter(k)} className={`ink-pill ${sidebarFilter===k?'filled':''}`} style={{fontSize:11}}>{l}</button>

              const active    = v.reg === selectedReg;
              const hasRed    = redAlerts.some(a => a.reg === v.reg);
              const hasOrange = orangeAlerts.some(a => a.reg === v.reg);
              const ecu       = ECU_DATA[v.reg];
              const borderColor = !active && hasRed ? 'var(--danger)' : !active && hasOrange ? 'var(--warn)' : 'var(--ink)';

                <button key={v.reg} onClick={()=>setSelectedReg(active ? null : v.reg)}
                  className="w-full text-left p-2.5 border-[1.5px] rounded-md flex items-center gap-2.5 wobble"
                  style={{ borderColor, background: active?'var(--ink)':'#fff', color: active?'var(--paper)':'var(--ink)', boxShadow: active?'2px 2px 0 0 #555':`2px 2px 0 0 ${borderColor}` }}>
                  <VehicleThumb v={v} size={26}/>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-1.5">
                      <span className="mono text-[12px] font-bold tracking-wider">{v.reg}</span>
                      {ecu?.ignition && <span style={{width:6,height:6,borderRadius:'50%',display:'inline-block',background:active?'rgba(255,255,255,0.7)':'var(--ok)'}}/>}
                    </div>
                    <div className="hand text-[11px] truncate" style={{opacity:active?0.8:0.65}}>{v.model}</div>
                    {ecu && !active && <div className="mono text-[10px]" style={{opacity:0.55}}>{ecu.ignition ? `${ecu.speed} km/h` : `senast ${ecu.updated}`}</div>}

                  <div className="flex flex-col items-end gap-1">
                    <StatusDot s={v.status}/>
                    {!active && (hasRed||hasOrange) && <span style={{width:5,height:5,borderRadius:'50%',display:'inline-block',background:hasRed?'var(--danger)':'var(--warn)'}}/>}

          <button className="ink-dash flex items-center justify-center gap-2 py-2.5 wobble">

          </button>

          {!picked
            ? <MapView vehicles={VEHICLES} colorful={colorful} redAlerts={redAlerts} orangeAlerts={orangeAlerts} onSelectVehicle={setSelectedReg}/>
            : <VehicleDetailE v={picked} colorful={colorful}
                redAlerts={redAlerts.filter(a=>a.reg===picked.reg)}
                orangeAlerts={orangeAlerts.filter(a=>a.reg===picked.reg)}
                onBack={()=>setSelectedReg(null)}/>
          }
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   APP SHELL — tabs switch between 4 wireframe options
   ============================================================ */
function App() {
  const [tweaks, setTweaks] = useState(() => {
    const stored = (typeof TWEAK_DEFAULS !== 'undefined') ? TWEAK_DEFAULS : {};
    return { ...stored };
  });
  const [option, setOption] = useState(tweaks.defaultOption || 'A');
  const [editMode, setEditMode] = useState(false);

  // tweaks host protocol
  useEffect(() => {
    function onMsg(e) {
      if (e.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    }
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  function updateTweak(k, v) {
    setTweaks(t => {
      const next = { ...t, [k]: v };
      window.parent.postMessage({type:'__edit_mode_set_keys', edits: { [k]: v }}, '*');
      return next;
    });
  }

  // Apply body class for paper bg variant
  useEffect(() => {
    document.body.classList.toggle('no-rules', tweaks.paperBg === 'plain');
    if (tweaks.paperBg === 'plain') {
      document.documentElement.style.setProperty('--paper', '#fdfcf7');
    } else {
      document.documentElement.style.setProperty('--paper', '#fbfaf5');
    }
    // font switch
    const map = { kalam:'Kalam', patrick:'Patrick Hand', caveat:'Caveat' };
    const fam = map[tweaks.fontFamily] || 'Kalam';
    document.documentElement.style.setProperty('--hand-font', fam);
  }, [tweaks]);

  const options = {
    A: { label:'A · Grid + drawer',     blurb:'Visuellt register, klicka → låda' },
    B: { label:'B · Fleet Dashboard',   blurb:'Topbar KPIs · larmstyrning · karta → fordon' },
    C: { label:'C · Flotthälsa-hub',    blurb:'Brådskande först, inline-utvik' },
    D: { label:'D · Garage-metafor',    blurb:'Karusell + funktionsvägg' },
    E: { label:'E · Full Architecture', blurb:'B-struktur + alla 6 moduler · körjournal · telematik · incidenter · compliance · 3-nivåers gating' },
  };

  return (
    <div style={{fontFamily: `"${ {kalam:'Kalam', patrick:'Patrick Hand', caveat:'Caveat'}[tweaks.fontFamily] || 'Kalam'}", cursive`}}>
      {/* Tabs strip */}
      <div className="sticky top-0 z-50 bg-[var(--paper-2)] border-b-[1.5px] border-black">
        <div className="max-w-[1180px] mx-auto px-6 pt-3 flex items-end gap-2 flex-wrap">
          <div className="hand font-bold text-lg mr-3 whitespace-nowrap">Wireframes:</div>
          {Object.entries(options).map(([k,o])=>(
            <button key={k} className={`tab ${option===k ? 'active' : ''}`} onClick={()=>setOption(k)}>
              {o.label}
            </button>
          ))}
          <div className="ml-auto hand text-[13px] text-[var(--ink-mute)] pb-2 whitespace-nowrap">{options[option].blurb}</div>
        </div>
      </div>

      {option === 'A' && <OptionA colorful={tweaks.showColorTouches} showTape={tweaks.showTape}/>}
      {option === 'B' && <OptionB colorful={tweaks.showColorTouches}/>}
      {option === 'C' && <OptionC colorful={tweaks.showColorTouches}/>}
      {option === 'D' && <OptionD colorful={tweaks.showColorTouches}/>}
      {option === 'E' && <OptionE colorful={tweaks.showColorTouches}/>}

      {/* footer notes row */}
      <div className="max-w-[1180px] mx-auto px-6 py-8 border-t border-dashed border-black/40">
        <div className="flex flex-wrap items-start gap-4">
          <div className="sticky-note" style={{maxWidth:280}}>
            Alla 4 alternativ använder samma data & funktionsset — bara sättet att <i>välja ett fordon</i> och öppna dess verktyg skiljer sig.
          </div>
          <div className="sticky-note" style={{maxWidth:280, transform:'rotate(1.4deg)', background:'#caf0c4'}}>
            Nästa: rita ut <b>en specifik funktion</b> (t.ex. Besiktning) i hi-fi för det vinnande alternativet.
          </div>
          <div className="sticky-note" style={{maxWidth:280, transform:'rotate(-0.6deg)', background:'#ffd7c2'}}>
            Behåll "gooey search"-knappen som brand-moment i alla alt. (se vehicle_list.ex).
          </div>
        </div>
      </div>

      {/* Tweaks panel */}
      {editMode && (
        <div className="tweaks">
          <h4 className="hand">Tweaks</h4>
          <div className="tweak-row">
            <label>Papper</label>
            <select value={tweaks.paperBg} onChange={e=>updateTweak('paperBg', e.target.value)}>
              <option value="ruled">linjerat</option>
              <option value="plain">slätt</option>
            </select>
          </div>
          <div className="tweak-row">
            <label>Handstil</label>
            <select value={tweaks.fontFamily} onChange={e=>updateTweak('fontFamily', e.target.value)}>
              <option value="kalam">Kalam</option>
              <option value="patrick">Patrick Hand</option>
              <option value="caveat">Caveat</option>
            </select>
          </div>
          <div className="tweak-row">
            <label>Färgstänk</label>
            <input type="checkbox" checked={tweaks.showColorTouches} onChange={e=>updateTweak('showColorTouches', e.target.checked)}/>
          </div>
          <div className="tweak-row">
            <label>Maskeringstejp</label>
            <input type="checkbox" checked={tweaks.showTape} onChange={e=>updateTweak('showTape', e.target.checked)}/>
          </div>
          <div className="tweak-row">
            <label>Startar på</label>
            <select value={tweaks.defaultOption} onChange={e=>updateTweak('defaultOption', e.target.value)}>
              <option>A</option><option>B</option><option>C</option><option>D</option><option>E</option>
            </select>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
