<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --ink: #1b1b1b;
    --ink-soft: #4a4a4a;
    --ink-mute: #8a8a8a;
    --paper: #fbfaf5;
    --paper-2: #f3f1e7;
    --line: #1b1b1b;
    --accent: #218E33;        /* only used sparingly */
    --danger: #c1292e;
    --warn:   #d59b1f;
    --ok:     #3b9d48;
  }
  html, body { background: var(--paper); color: var(--ink); font-family: "Kalam", "Patrick Hand", cursive; }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; font-weight: 500; }
  .hand { font-family: "Kalam", cursive; }
  .script { font-family: "Caveat", cursive; }

  /* --- Sketchy paper background with faint ruled lines --- */
  .paper {
    background-color: var(--paper);
    background-image:
      linear-gradient(rgba(0,0,0,0.035) 1px, transparent 1px);
    background-size: 100% 28px;
  }
  .paper-plain { background: var(--paper); }

  /* --- Wobbly hand-drawn stroke via multiple box-shadows & subtle skew --- */
  .ink-box {
    border: 1.5px solid var(--ink);
    border-radius: 6px;
    box-shadow: 2px 2px 0 0 var(--ink);
    background: #ffffff;
  }
  .ink-box-soft {
    border: 1.25px solid var(--ink);
    border-radius: 6px;
    background: #ffffff;
  }
  .ink-dash {
    border: 1.5px dashed var(--ink);
    border-radius: 8px;
    background: rgba(255,255,255,0.6);
  }
  .ink-pill {
    border: 1.25px solid var(--ink);
    border-radius: 999px;
    background: #ffffff;
    padding: 2px 10px;
    font-family: "Kalam", cursive;
    font-weight: 700;
    font-size: 13px;
    line-height: 1.3;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
  }
  .ink-pill.filled { background: var(--ink); color: var(--paper); }
  .ink-btn {
    border: 1.5px solid var(--ink);
    border-radius: 6px;
    box-shadow: 2px 2px 0 0 var(--ink);
    background: #fff;
    padding: 6px 14px;
    font-family: "Kalam", cursive;
    font-weight: 700;
    transition: transform 80ms ease, box-shadow 80ms ease;
    cursor: pointer;
    white-space: nowrap;
  }
  .ink-btn:hover { transform: translate(1px,1px); box-shadow: 1px 1px 0 0 var(--ink); }
  .ink-btn:active { transform: translate(2px,2px); box-shadow: 0 0 0 0 var(--ink); }
  .ink-btn.primary { background: var(--ink); color: var(--paper); }
  .ink-btn.accent  { background: var(--accent); color: #fff; border-color: #0e5f21; box-shadow: 2px 2px 0 0 #0e5f21; }

  /* Dot status */
  .dot { width: 10px; height: 10px; border-radius: 999px; border: 1.25px solid var(--ink); display:inline-block; }
  .dot.ok   { background: var(--ok); }
  .dot.warn { background: var(--warn); }
  .dot.bad  { background: var(--danger); }
  .dot.off  { background: #d9d9d9; }

  /* Underline scribble */
  .scribble { position: relative; }
  .scribble::after{
    content:""; position:absolute; left:-2px; right:-2px; bottom:-6px; height:8px;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 8' preserveAspectRatio='none'><path d='M0 5 C 15 1, 30 8, 45 4 S 75 7, 90 3 S 115 6, 120 4' stroke='%231b1b1b' stroke-width='1.8' fill='none' stroke-linecap='round'/></svg>") center/100% 100% no-repeat;
  }

  /* Hand-crossed checkbox */
  .check { width:16px; height:16px; border:1.5px solid var(--ink); border-radius:3px; display:inline-block; position:relative; background:#fff; }
  .check.on::after {
    content:""; position:absolute; inset:1px;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path d='M1 6 L5 10 L11 1' stroke='%231b1b1b' stroke-width='2' fill='none' stroke-linecap='round'/></svg>") center/contain no-repeat;
  }

  /* Small img wash for placeholder silhouettes */
  .silhouette {
    filter: grayscale(1) contrast(1.2) brightness(0.65);
    mix-blend-mode: multiply;
    opacity: 0.9;
  }
  .silhouette-big { filter: grayscale(1) contrast(1.3) brightness(0.55); opacity: 0.92; mix-blend-mode: multiply; }

  /* Tiny wiggle on hover for cards */
  .wobble:hover { transform: rotate(-0.3deg) translate(-1px,-1px); }
  .wobble { transition: transform 120ms ease; }

  /* Tab bar */
  .tab {
    font-family: "Kalam", cursive; font-weight: 700; font-size: 16px;
    padding: 8px 16px; border: 1.5px solid var(--ink);
    border-bottom: none; border-radius: 10px 10px 0 0;
    background: #fff; color: var(--ink-soft);
    margin-right: 4px; cursor: pointer; position: relative; top: 1px;
    white-space: nowrap;
  }
  .tab.active { background: var(--ink); color: var(--paper); box-shadow: 2px -2px 0 0 var(--ink); }

  /* Torn-edge strip */
  .tape {
    position: absolute; width: 70px; height: 18px;
    background: rgba(234,196,56,0.45); border: 1px dashed rgba(0,0,0,0.3);
    transform: rotate(-4deg);
  }

  /* Legend callout arrow */
  .arrow { stroke: var(--ink); fill: none; stroke-width: 1.5; stroke-linecap: round; }

  /* function tile */
  .fn-tile {
    border: 1.5px solid var(--ink);
    background: #fff;
    border-radius: 8px;
    padding: 12px;
    display: flex; flex-direction: column; gap: 6px;
    min-height: 90px;
    box-shadow: 2px 2px 0 0 var(--ink);
    cursor: pointer;
    transition: transform 80ms ease, box-shadow 80ms ease;
  }
  .fn-tile:hover { transform: translate(1px,1px); box-shadow: 1px 1px 0 0 var(--ink); }
  .fn-tile .ic {
    width: 28px; height: 28px; border: 1.5px solid var(--ink); border-radius: 6px;
    display:flex; align-items:center; justify-content:center; background: var(--paper-2); font-size: 14px;
  }

  /* Tweaks floating panel */
  .tweaks {
    position: fixed; right: 18px; bottom: 18px; z-index: 60;
    background: #fff; border: 1.5px solid var(--ink); border-radius: 10px;
    box-shadow: 3px 3px 0 0 var(--ink);
    padding: 14px; min-width: 240px; font-family: "Kalam", cursive;
  }
  .tweaks h4 { font-weight: 700; font-size: 14px; margin-bottom: 8px; }
  .tweak-row { display:flex; justify-content:space-between; align-items:center; gap:10px; padding: 4px 0; font-size: 14px; }
  .tweaks select, .tweaks input { border: 1.25px solid var(--ink); border-radius: 4px; padding: 2px 6px; font-family: inherit; font-size: 13px; background: #fff; }

  /* SVG wobble border to apply as background */
  .wobble-border {
    border: none !important;
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' preserveAspectRatio='none'><rect x='1' y='1' width='98' height='98' rx='4' stroke='%231b1b1b' stroke-width='1.6' fill='none' stroke-dasharray='0' stroke-linejoin='round'/></svg>");
    background-size: 100% 100%;
    background-repeat: no-repeat;
    background-color: #fff;
    border-radius: 6px;
  }

  /* Note sticky */
  .sticky-note {
    background: #fff6b3; border: 1px solid #d2c67a; padding: 8px 10px;
    font-family: "Caveat", cursive; font-size: 17px; line-height: 1.2;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.15);
    transform: rotate(-1.2deg);
  }
</style>

<!-- Speaker notes / notes: NONE (user didn't ask) -->

/* ============================================================

   ============================================================ */

function SketchHeader({ onHome }) {
  return (
    <header className="border-b border-dashed border-black/50 bg-[var(--paper)]">

        </div>
      </div>
    </header>
  );

function StatusDot({ s }) {
  return <span className={`dot ${s==='ok'?'ok':s==='warn'?'warn':s==='off'?'off':'bad'}`}></span>;
}

function VehicleThumb({ v, size=40 }) {
  return (
    <img
      src={`assets/vehicles/${v.type}.svg`}
      alt={v.model}
      className="silhouette"
      style={{width:size*1.3, height:size, objectFit:'contain'}}
    />
  );
}

function PlaceholderPhoto({ label='photo', w=240, h=140 }) {
  return (
    <div style={{width:w,height:h}} className="border-[1.5px] border-[var(--ink)] rounded-md bg-[var(--paper-2)] relative overflow-hidden">
      <svg viewBox={`0 0 ${w} ${h}`} className="absolute inset-0 w-full h-full">
        <line x1="0" y1="0" x2={w} y2={h} stroke="var(--ink)" strokeWidth="0.8" />

      </svg>
      <span className="mono absolute left-1 bottom-1 text-[10px] opacity-70">{label}</span>
    </div>
  );

  return (
    <button className="fn-tile text-left wobble">
      <div className="flex items-center gap-2">
        <div className="ic mono" style={{background: colorful ? 'var(--paper-2)' : '#fff'}}>{f.ic}</div>

      </div>
      <div className="text-[12px] text-[var(--ink-mute)]">{f.sub}</div>
    </button>
  );
}

/* ============================================================
   OPTION A — Grid of vehicle cards → slide-in detail drawer
   ============================================================ */

  const [picked, setPicked] = useState(null);
  const [filter, setFilter] = useState('all');
  const shown = VEHICLES.filter(v => filter==='all' ? true : v.status===filter);

            <button className="ink-btn primary">＋ Lägg till fordon</button>

            <span>sortera:</span>
            <span className="ink-pill" style={{background:'#fff'}}>regnr ▾</span>

        </div>

        {/* grid */}
        <div className="grid grid-cols-4 gap-4">

              className="ink-box p-3 text-left wobble relative bg-white">
              <div className="flex items-start justify-between">
                <div>
                  <div className="mono text-[17px] font-bold tracking-wider">{v.reg}</div>

                </div>
                <div className="flex items-center gap-1 ink-pill" style={{fontSize:11, padding:'1px 6px',

              </div>
              <div className="flex items-center justify-center py-3">
                <VehicleThumb v={v} size={48}/>
              </div>
              <div className="flex justify-between text-xs">
                <span className="mono text-[var(--ink-mute)]">{v.year}</span>
                <span className="mono text-[var(--ink-mute)]">{v.km.toLocaleString('sv-SE')} km</span>
              </div>
              <div className="mt-2 pt-2 border-t border-dashed border-black/30 hand text-[12.5px]">
                <span className="text-[var(--ink-mute)]">nästa: </span>{v.nextEvent}
              </div>
            </button>
          ))}
          {/* add-card */}
          <button className="ink-dash flex flex-col items-center justify-center min-h-[180px] wobble">
            <div className="text-3xl hand">＋</div>
            <div className="hand text-sm">Lägg till fordon</div>
            <div className="mono text-[11px] text-[var(--ink-mute)] mt-1">regnr-först flöde</div>

        </div>

        {showTape && <div className="tape" style={{top:88, left:-8}}></div>}
      </div>

      {/* Drawer */}
      {picked && (
        <div className="fixed inset-0 z-40 bg-black/30 flex justify-end" onClick={()=>setPicked(null)}>
          <div onClick={e=>e.stopPropagation()}
            className="h-full bg-[var(--paper)] border-l-2 border-black overflow-y-auto"
            style={{width:'min(720px, 80vw)'}}>
            <div className="px-6 py-5 border-b border-dashed border-black/50 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <VehicleThumb v={picked} size={42}/>
                <div>
                  <div className="mono text-xl font-bold tracking-wider">{picked.reg}</div>
                  <div className="hand text-sm text-[var(--ink-soft)]">{picked.model} · {picked.year}</div>
                </div>
                <div className="ink-pill ml-3" style={{
                  background: colorful && picked.status==='ok' ? '#e8f5ea' : colorful && picked.status==='warn' ? '#fdf3d4' : '#fbe0e0'
                }}>
                  <StatusDot s={picked.status}/> <span className="ml-1">{STATUS_LABEL[picked.status]}</span>
                </div>
              </div>
              <button onClick={()=>setPicked(null)} className="ink-btn">stäng ✕</button>
            </div>

            <div className="px-6 py-5">
              <div className="grid grid-cols-3 gap-3 mb-6">

/* DriverCell — default card state only; expansion is handled by the parent grid.

            className="flex items-center gap-2.5 pr-6 hover:opacity-75 transition-opacity">

/* ============================================================
   APP SHELL — tabs switch between 4 wireframe options
   ============================================================ */
function App() {
  const [tweaks, setTweaks] = useState(() => {
    const stored = (typeof TWEAK_DEFAULS !== 'undefined') ? TWEAK_DEFAULS : {};
    return { ...stored };
  });
  const [option, setOption] = useState(tweaks.defaultOption || 'A');
  const [editMode, setEditMode] = useState(false);

  // tweaks host protocol
  useEffect(() => {
    function onMsg(e) {
      if (e.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    }
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  function updateTweak(k, v) {
    setTweaks(t => {
      const next = { ...t, [k]: v };
      window.parent.postMessage({type:'__edit_mode_set_keys', edits: { [k]: v }}, '*');
      return next;
    });
  }

  // Apply body class for paper bg variant
  useEffect(() => {
    document.body.classList.toggle('no-rules', tweaks.paperBg === 'plain');
    if (tweaks.paperBg === 'plain') {
      document.documentElement.style.setProperty('--paper', '#fdfcf7');
    } else {
      document.documentElement.style.setProperty('--paper', '#fbfaf5');
    }
    // font switch
    const map = { kalam:'Kalam', patrick:'Patrick Hand', caveat:'Caveat' };
    const fam = map[tweaks.fontFamily] || 'Kalam';
    document.documentElement.style.setProperty('--hand-font', fam);
  }, [tweaks]);

  const options = {
    A: { label:'A · Grid + drawer',     blurb:'Visuellt register, klicka → låda' },
    B: { label:'B · Fleet Dashboard',     blurb:'Topbar KPIs · larmstyrning · karta → fordon' },
    C: { label:'C · Flotthälsa-hub',    blurb:'Brådskande först, inline-utvik' },
    D: { label:'D · Garage-metafor',    blurb:'Karusell + funktionsvägg' },
  };

  return (
    <div style={{fontFamily: `"${ {kalam:'Kalam', patrick:'Patrick Hand', caveat:'Caveat'}[tweaks.fontFamily] || 'Kalam'}", cursive`}}>
      {/* Tabs strip */}
      <div className="sticky top-0 z-50 bg-[var(--paper-2)] border-b-[1.5px] border-black">
        <div className="max-w-[1180px] mx-auto px-6 pt-3 flex items-end gap-2 flex-wrap">
          <div className="hand font-bold text-lg mr-3 whitespace-nowrap">Wireframes:</div>
          {Object.entries(options).map(([k,o])=>(
            <button key={k} className={`tab ${option===k ? 'active' : ''}`} onClick={()=>setOption(k)}>
              {o.label}
            </button>
          ))}
          <div className="ml-auto hand text-[13px] text-[var(--ink-mute)] pb-2 whitespace-nowrap">{options[option].blurb}</div>
        </div>
      </div>

      {option === 'A' && <OptionA colorful={tweaks.showColorTouches} showTape={tweaks.showTape}/>}
      {option === 'B' && <OptionB colorful={tweaks.showColorTouches}/>}
      {option === 'C' && <OptionC colorful={tweaks.showColorTouches}/>}
      {option === 'D' && <OptionD colorful={tweaks.showColorTouches}/>}

      {/* footer notes row */}
      <div className="max-w-[1180px] mx-auto px-6 py-8 border-t border-dashed border-black/40">
        <div className="flex flex-wrap items-start gap-4">
          <div className="sticky-note" style={{maxWidth:280}}>
            Alla 4 alternativ använder samma data & funktionsset — bara sättet att <i>välja ett fordon</i> och öppna dess verktyg skiljer sig.
          </div>
          <div className="sticky-note" style={{maxWidth:280, transform:'rotate(1.4deg)', background:'#caf0c4'}}>
            Nästa: rita ut <b>en specifik funktion</b> (t.ex. Besiktning) i hi-fi för det vinnande alternativet.
          </div>
          <div className="sticky-note" style={{maxWidth:280, transform:'rotate(-0.6deg)', background:'#ffd7c2'}}>
            Behåll "gooey search"-knappen som brand-moment i alla alt. (se vehicle_list.ex).
          </div>
        </div>
      </div>

      {/* Tweaks panel */}
      {editMode && (
        <div className="tweaks">
          <h4 className="hand">Tweaks</h4>
          <div className="tweak-row">
            <label>Papper</label>
            <select value={tweaks.paperBg} onChange={e=>updateTweak('paperBg', e.target.value)}>
              <option value="ruled">linjerat</option>
              <option value="plain">slätt</option>
            </select>
          </div>
          <div className="tweak-row">
            <label>Handstil</label>
            <select value={tweaks.fontFamily} onChange={e=>updateTweak('fontFamily', e.target.value)}>
              <option value="kalam">Kalam</option>
              <option value="patrick">Patrick Hand</option>
              <option value="caveat">Caveat</option>
            </select>
          </div>
          <div className="tweak-row">
            <label>Färgstänk</label>
            <input type="checkbox" checked={tweaks.showColorTouches} onChange={e=>updateTweak('showColorTouches', e.target.checked)}/>
          </div>
          <div className="tweak-row">
            <label>Maskeringstejp</label>
            <input type="checkbox" checked={tweaks.showTape} onChange={e=>updateTweak('showTape', e.target.checked)}/>
          </div>
          <div className="tweak-row">
            <label>Startar på</label>
            <select value={tweaks.defaultOption} onChange={e=>updateTweak('defaultOption', e.target.value)}>
              <option>A</option><option>B</option><option>C</option><option>D</option>
            </select>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
